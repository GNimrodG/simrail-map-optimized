name: Backend

on:
  push:
    branches:
      - master
    paths:
      - "smo-backend/**"
      - ".github/workflows/build-backend.yml"
  pull_request:
    branches:
      - master
    paths:
      - "smo-backend/**"
      - ".github/workflows/build-backend.yml"

jobs:
  test-backend:
    name: Run Backend Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      - name: Restore
        run: dotnet restore ./smo-backend/smo-backend.sln
      - name: Test
        id: run-tests
        continue-on-error: true
        run: >-
          dotnet test ./smo-backend/smo-backend.Tests/smo-backend.Tests.csproj
          --configuration Release
          --no-restore
          --logger "trx;LogFileName=test-results.trx"
          --results-directory ./smo-backend/TestResults
      - name: Publish Test Report
        if: always()
        uses: dorny/test-reporter@v2
        with:
          name: Backend Tests
          path: smo-backend/TestResults/*.trx
          reporter: dotnet-trx
      - name: Fail if tests failed
        if: steps.run-tests.outcome == 'failure'
        run: exit 1

  build-backend:
    name: Build and Push
    needs: test-backend
    runs-on: ubuntu-latest
    env:
      SHOULD_PUSH: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/master' && secrets.DOCKER_REGISTRY_USERNAME != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          # list of Docker images to use as base name for tags
          images: ${{ vars.DOCKER_REGISTRY_URL }}/smo-backend
          # generate Docker tags based on the following events/attributes
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}
            type=sha
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to the registry
        if: ${{ env.SHOULD_PUSH == 'true' }}
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.DOCKER_REGISTRY_URL }}
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKER_REGISTRY_TOKEN }}
      - name: Build
        uses: docker/build-push-action@v6
        with:
          context: ./smo-backend
          push: ${{ env.SHOULD_PUSH == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
